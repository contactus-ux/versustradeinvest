<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Versus Trade Invest</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

nav button{
background:#1e293b;
border:none;
color:white;
padding:10px 15px;
border-radius:6px;
}

section{
padding:20px;
display:none;
}

.active{
display:block;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button.main{
background:#22c55e;
color:white;
padding:12px;
border:none;
border-radius:8px;
width:100%;
margin-top:10px;
}

.price{
font-size:18px;
margin-top:10px;
}

.footer{
text-align:center;
padding:20px;
background:#020617;
}

.whatsapp{
background:#25D366;
padding:10px;
border-radius:6px;
color:white;
display:inline-block;
margin:5px;
}

.call{
background:#3b82f6;
padding:10px;
border-radius:6px;
color:white;
display:inline-block;
margin:5px;
}

</style>
</head>

<body>

<header>
Versus Trade Invest
</header>

<nav>
<button onclick="openPage('home')">Home</button>
<button onclick="openPage('trade')">Trade</button>
<button onclick="openPage('invest')">Invest</button>
<button onclick="openPage('deposit')">Deposit</button>
<button onclick="openPage('account')">Account</button>
</nav>

<!-- HOME -->

<section id="home" class="active">

<div class="card">
<h3>Live Crypto Prices</h3>

<div class="price">BTC: $<span id="btc"></span></div>
<div class="price">ETH: $<span id="eth"></span></div>
<div class="price">USDT: $<span id="usdt"></span></div>

</div>

<div class="card">
<h3>Investment Plan</h3>
<p>Invest ₹1,00,000 → Daily Profit 3%</p>
</div>

</section>

<!-- TRADE -->

<section id="trade">

<div class="card">

<h3>Crypto Trading</h3>

<select>
<option>BTC/USDT</option>
<option>ETH/USDT</option>
</select>

<input placeholder="Enter Amount">

<button class="main">Buy</button>
<button class="main">Sell</button>

</div>

</section>

<!-- INVEST -->

<section id="invest">

<div class="card">

<h3>Profit Calculator</h3>

<input id="investAmount" placeholder="Enter Amount">

<button class="main" onclick="calcProfit()">Calculate Profit</button>

<div id="profitResult"></div>

</div>

</section>

<!-- DEPOSIT -->

<section id="deposit">

<div class="card">

<h3>Deposit via UPI / Bank</h3>

<select>
<option>UPI</option>
<option>Bank Transfer</option>
</select>

<input placeholder="Enter Amount">

<p>UPI ID: yourupi@bank</p>

<button class="main">Submit Deposit</button>

</div>

</section>

<!-- ACCOUNT -->

<section id="account">

<div class="card">

<h3>Login</h3>

<input placeholder="Email">

<input placeholder="Password" type="password">

<button class="main">Login</button>

</div>

<div class="card">

<h3>Register</h3>

<input placeholder="Name">

<input placeholder="Email">

<input placeholder="Password">

<button class="main">Register</button>

</div>

</section>

<div class="footer">

<a class="whatsapp" href="https://wa.me/919999999999">WhatsApp</a>

<a class="call" href="tel:+919999999999">Call</a>

</div>

<script>

function openPage(page){

let pages=document.querySelectorAll("section");

pages.forEach(p=>p.classList.remove("active"));

document.getElementById(page).classList.add("active");

}

function calcProfit(){

let amount=document.getElementById("investAmount").value;

let profit=amount*0.03;

document.getElementById("profitResult").innerHTML=
"Daily Profit: ₹"+profit;

}

async function prices(){

let res=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether&vs_currencies=usd");

let data=await res.json();

btc.innerHTML=data.bitcoin.usd;

eth.innerHTML=data.ethereum.usd;

usdt.innerHTML=data.tether.usd;

}

prices();

setInterval(prices,10000);

</script>

</body>
</html>
