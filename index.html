<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Versus Trade Invest</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
background:#0b0e11;
color:white;
font-family:Arial;
}

header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
}

.logo{
font-weight:bold;
font-size:20px;
}

nav span{
margin:10px;
cursor:pointer;
}

.container{
display:grid;
grid-template-columns:200px 1fr 300px;
height:90vh;
}

/* MARKET */

.market{
background:#111;
padding:10px;
overflow:auto;
}

.market div{
padding:10px;
border-bottom:1px solid #333;
}

/* CHART */

.chart{
background:#000;
}

/* TRADE PANEL */

.trade{
background:#111;
padding:15px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
}

.buy{
background:#16c784;
color:white;
padding:10px;
width:100%;
margin-top:10px;
border:none;
}

.sell{
background:#ea3943;
color:white;
padding:10px;
width:100%;
margin-top:10px;
border:none;
}

</style>
</head>

<body>

<header>

<div class="logo">
Versus Trade Invest
</div>

<nav>
<span>Markets</span>
<span>Trade</span>
<span>Wallet</span>
<span>Login</span>
</nav>

</header>

<div class="container">

<!-- MARKET LIST -->

<div class="market">

<h3>Markets</h3>

<div>BTC/USDT</div>
<div>ETH/USDT</div>
<div>SOL/USDT</div>
<div>XRP/USDT</div>

</div>

<!-- CHART -->

<div class="chart">

<div id="tradingview" style="height:100%;"></div>

</div>

<!-- TRADE PANEL -->

<div class="trade">

<h3>Trade</h3>

<select>
<option>BTC/USDT</option>
<option>ETH/USDT</option>
</select>

<input placeholder="Price">

<input placeholder="Amount">

<button class="buy">Buy</button>

<button class="sell">Sell</button>

</div>

</div>

<script>

new TradingView.widget({
"container_id":"tradingview",
"symbol":"BINANCE:BTCUSDT",
"interval":"5",
"theme":"dark",
"style":"1",
"locale":"en",
"toolbar_bg":"#f1f3f6",
"enable_publishing":false,
"hide_side_toolbar":false,
"allow_symbol_change":true,
"height":"100%"
});

</script>

</body>
</html>
