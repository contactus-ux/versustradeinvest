```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crypto Trading Platform</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:10px;
}

#chart{
flex:2;
min-width:600px;
}

#trade,#deposit,#wallet{
flex:1;
min-width:280px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:5px;
border:none;
}

button{
background:#22c55e;
border:none;
padding:10px;
border-radius:5px;
width:100%;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

ul{
font-size:14px;
}

.login{
max-width:300px;
margin:80px auto;
background:#1e293b;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<header>
Crypto Trading Platform
</header>

<!-- LOGIN -->

<div id="loginPage" class="login">

<h3>Login / Signup</h3>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Enter Platform</button>

<p id="loginMsg"></p>

</div>

<!-- MAIN PLATFORM -->

<div id="platform" style="display:none">

<div class="container">

<!-- CHART -->

<div class="box" id="chart">

<h3>Market Chart</h3>

<div id="tradingview_chart"></div>

</div>

<!-- WALLET -->

<div class="box" id="wallet">

<h3>Wallet</h3>

Balance: ₹ <span id="balance">0</span>

</div>

<!-- TRADING -->

<div class="box" id="trade">

<h3>Option Trading</h3>

<label>Crypto Pair</label>

<select id="pair">
<option>BTC/USDT</option>
<option>ETH/USDT</option>
<option>BNB/USDT</option>
</select>

<label>Trade Type</label>

<select id="type">
<option>BUY</option>
<option>SELL</option>
</select>

<label>Amount (₹)</label>

<input type="number" id="amount">

<button onclick="trade()">Execute Trade</button>

<p id="result"></p>

<h4>Trade History</h4>

<ul id="history"></ul>

</div>

<!-- DEPOSIT -->

<div class="box" id="deposit">

<h3>Deposit (UPI / Bank)</h3>

<select>
<option>UPI</option>
<option>Bank Transfer</option>
</select>

<input type="number" id="depositAmount" placeholder="Amount ₹">

<input type="text" placeholder="UPI ID / Ref Number">

<button onclick="deposit()">Submit Deposit</button>

<p id="depositMsg"></p>

</div>

</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

let balance=0;

function login(){

let user=document.getElementById("username").value;

if(user==""){
document.getElementById("loginMsg").innerText="Enter username";
return;
}

document.getElementById("loginPage").style.display="none";

document.getElementById("platform").style.display="block";

loadChart();

}

function loadChart(){

new TradingView.widget({
"width":"100%",
"height":400,
"symbol":"BINANCE:BTCUSDT",
"interval":"5",
"theme":"dark",
"style":"1",
"container_id":"tradingview_chart"
});

}

function deposit(){

let amount=parseFloat(document.getElementById("depositAmount").value);

if(!amount)return;

balance+=amount;

document.getElementById("balance").innerText=balance;

document.getElementById("depositMsg").innerText="Deposit added successfully";

}

function trade(){

let amount=parseFloat(document.getElementById("amount").value);

let type=document.getElementById("type").value;

let pair=document.getElementById("pair").value;

if(amount>balance){

document.getElementById("result").innerText="Insufficient Balance";

return;

}

balance-=amount;

document.getElementById("balance").innerText=balance;

let msg=type+" "+pair+" ₹"+amount;

document.getElementById("result").innerText="Trade Executed: "+msg;

let li=document.createElement("li");

li.innerText=msg;

document.getElementById("history").appendChild(li);

}

</script>

</body>
</html>
