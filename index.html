```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Crypto Trading</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
}

button:hover{
background:#16a34a;
}

#login{
max-width:350px;
margin:80px auto;
}

.chart{
height:350px;
}

ul{
font-size:14px;
}

.balance{
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
Crypto Trading App
</header>

<!-- LOGIN -->

<div id="login">

<div class="card">

<h3>Login</h3>

<input type="text" id="user" placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

</div>

<!-- MAIN APP -->

<div id="app" style="display:none">

<div class="container">

<!-- WALLET -->

<div class="card">

<div class="balance">
Wallet Balance: ₹ <span id="balance">0</span>
</div>

</div>

<!-- CHART -->

<div class="card">

<h3>Market Chart</h3>

<div id="chart" class="chart"></div>

</div>

<!-- TRADING -->

<div class="card">

<h3>Trade</h3>

<label>Crypto Pair</label>

<select id="pair">
<option>BTC/USDT</option>
<option>ETH/USDT</option>
<option>BNB/USDT</option>
</select>

<label>Trade Type</label>

<select id="type">
<option>BUY</option>
<option>SELL</option>
</select>

<label>Amount ₹</label>

<input type="number" id="amount">

<button onclick="trade()">Execute Trade</button>

<p id="tradeMsg"></p>

</div>

<!-- DEPOSIT -->

<div class="card">

<h3>Deposit</h3>

<select>
<option>UPI</option>
<option>Bank Transfer</option>
</select>

<input type="number" id="depAmount" placeholder="Deposit Amount">

<input placeholder="UPI ID / Ref Number">

<button onclick="deposit()">Submit Deposit</button>

<p id="depMsg"></p>

</div>

<!-- HISTORY -->

<div class="card">

<h3>Trade History</h3>

<ul id="history"></ul>

</div>

</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

let balance=0;

function login(){

let user=document.getElementById("user").value;

if(user==""){

document.getElementById("msg").innerText="Enter username";

return;

}

document.getElementById("login").style.display="none";

document.getElementById("app").style.display="block";

loadChart();

}

function loadChart(){

new TradingView.widget({
"width":"100%",
"height":350,
"symbol":"BINANCE:BTCUSDT",
"interval":"5",
"theme":"dark",
"style":"1",
"container_id":"chart"
});

}

function deposit(){

let amt=parseFloat(document.getElementById("depAmount").value);

if(!amt)return;

balance+=amt;

document.getElementById("balance").innerText=balance;

document.getElementById("depMsg").innerText="Deposit successful";

}

function trade(){

let amt=parseFloat(document.getElementById("amount").value);

let pair=document.getElementById("pair").value;

let type=document.getElementById("type").value;

if(amt>balance){

document.getElementById("tradeMsg").innerText="Insufficient Balance";

return;

}

balance-=amt;

document.getElementById("balance").innerText=balance;

let msg=type+" "+pair+" ₹"+amt;

document.getElementById("tradeMsg").innerText="Trade executed";

let li=document.createElement("li");

li.innerText=msg;

document.getElementById("history").appendChild(li);

}

</script>

</body>
</html>
