```html
<!DOCTYPE html>
<html>
<head>
<title>Versus Trade Invest</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.page{
display:none;
padding:15px;
padding-bottom:80px;
}

.active{
display:block;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.balance{
font-size:20px;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
}

button.sell{
background:#ef4444;
}

.bottomNav{
position:fixed;
bottom:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.bottomNav button{
background:none;
border:none;
color:white;
font-size:14px;
}

.chart{
height:300px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:8px;
border:1px solid #334155;
text-align:center;
}

</style>

</head>

<body>

<header>Versus Trade Invest</header>

<!-- HOME -->

<div id="home" class="page active">

<div class="card">
<h3>Dashboard</h3>
<p>Welcome to Versus Trade Invest</p>
</div>

<div class="card">
<div class="balance">
Wallet Balance ₹ <span id="balance">0</span>
</div>
</div>

</div>

<!-- TRADE -->

<div id="trade" class="page">

<div class="card">
<h3>Market Chart</h3>
<div id="chart" class="chart"></div>
</div>

<div class="card">

<select id="pair">
<option>BTC/USDT</option>
<option>ETH/USDT</option>
<option>BNB/USDT</option>
</select>

<input type="number" id="amount" placeholder="Trade Amount ₹">

<button onclick="trade('BUY')">Buy</button>
<button class="sell" onclick="trade('SELL')">Sell</button>

<p id="tradeMsg"></p>

</div>

</div>

<!-- DEPOSIT -->

<div id="deposit" class="page">

<div class="card">

<h3>Deposit Funds</h3>

<select id="method">

<option value="">Select Method</option>
<option value="upi">UPI</option>
<option value="bank">Bank Transfer</option>

</select>

<div id="payInfo"></div>

<input type="number" id="depAmount" placeholder="Deposit Amount ₹">

<input placeholder="Transaction ID">

<button onclick="deposit()">Submit Deposit</button>

<p id="depMsg"></p>

</div>

</div>

<!-- WALLET -->

<div id="wallet" class="page">

<div class="card">

<h3>Wallet</h3>

Balance ₹ <span id="balance2">0</span>

</div>

</div>

<!-- HISTORY -->

<div id="historyPage" class="page">

<div class="card">

<h3>Trade History</h3>

<table>

<tr>
<th>Pair</th>
<th>Type</th>
<th>Amount</th>
</tr>

<tbody id="history"></tbody>

</table>

</div>

</div>

<!-- NAVIGATION -->

<div class="bottomNav">

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('trade')">Trade</button>
<button onclick="showPage('deposit')">Deposit</button>
<button onclick="showPage('wallet')">Wallet</button>
<button onclick="showPage('historyPage')">History</button>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

let balance=0;

function showPage(page){

let pages=document.querySelectorAll(".page");

pages.forEach(p=>p.classList.remove("active"));

document.getElementById(page).classList.add("active");

}

new TradingView.widget({
symbol:"BINANCE:BTCUSDT",
interval:"15",
theme:"dark",
style:"1",
width:"100%",
height:300,
container_id:"chart"
});

function deposit(){

let amt=parseFloat(document.getElementById("depAmount").value);

if(!amt)return;

balance+=amt;

document.getElementById("balance").innerText=balance;

document.getElementById("balance2").innerText=balance;

document.getElementById("depMsg").innerText="Deposit Request Submitted";

}

function trade(type){

let amt=parseFloat(document.getElementById("amount").value);

let pair=document.getElementById("pair").value;

if(amt>balance){

document.getElementById("tradeMsg").innerText="Insufficient Balance";

return;

}

balance-=amt;

document.getElementById("balance").innerText=balance;

document.getElementById("balance2").innerText=balance;

let row="<tr><td>"+pair+"</td><td>"+type+"</td><td>"+amt+"</td></tr>";

document.getElementById("history").innerHTML+=row;

document.getElementById("tradeMsg").innerText="Trade Executed";

}

document.getElementById("method").addEventListener("change",function(){

let d=document.getElementById("payInfo");

if(this.value=="upi"){

d.innerHTML="<p>UPI ID: versustrade@upi</p>";

}

else if(this.value=="bank"){

d.innerHTML="<p>Bank: HDFC Bank<br>Account: 1234567890<br>IFSC: HDFC0001234</p>";

}

else{

d.innerHTML="";

}

});

</script>

</body>
</html>
```
