<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Versus Trade Invest</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* HEADER */

header{
background:#020617;
padding:15px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.logo{
width:35px;
height:35px;
background:#22c55e;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.title{
font-size:20px;
font-weight:bold;
}

/* NAV */

nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
position:sticky;
top:0;
}

nav button{
background:#1e293b;
border:none;
color:white;
padding:10px;
border-radius:6px;
font-size:14px;
}

/* SECTIONS */

section{
padding:15px;
display:none;
}

.active{
display:block;
}

/* CARDS */

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

/* INPUTS */

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

/* BUTTON */

.main{
background:#22c55e;
color:white;
padding:12px;
border:none;
border-radius:8px;
width:100%;
margin-top:10px;
}

/* PRICE */

.price{
font-size:18px;
margin-top:10px;
}

/* FOOTER */

.footer{
text-align:center;
padding:20px;
background:#020617;
}

.support{
display:inline-block;
padding:10px;
margin:5px;
border-radius:6px;
color:white;
text-decoration:none;
}

.whatsapp{background:#25D366;}
.call{background:#3b82f6;}

</style>
</head>

<body>

<header>
<div class="logo">VT</div>
<div class="title">Versus Trade Invest</div>
</header>

<nav>
<button onclick="openPage('home')">Home</button>
<button onclick="openPage('trade')">Trade</button>
<button onclick="openPage('invest')">Invest</button>
<button onclick="openPage('deposit')">Deposit</button>
<button onclick="openPage('account')">Account</button>
</nav>

<!-- HOME -->

<section id="home" class="active">

<div class="card">
<h3>Live Crypto Market</h3>

<div class="price">BTC: $<span id="btc"></span></div>
<div class="price">ETH: $<span id="eth"></span></div>
<div class="price">USDT: $<span id="usdt"></span></div>

</div>

<div class="card">
<h3>Investment Plan</h3>
<p>Invest ₹1,00,000 → Earn 3% Daily Profit</p>
</div>

</section>

<!-- TRADE -->

<section id="trade">

<div class="card">

<h3>Crypto Trading</h3>

<select>
<option>BTC/USDT</option>
<option>ETH/USDT</option>
</select>

<input placeholder="Enter Amount">

<button class="main">Buy</button>
<button class="main">Sell</button>

</div>

</section>

<!-- INVEST -->

<section id="invest">

<div class="card">

<h3>Profit Calculator</h3>

<input id="amount" placeholder="Enter Investment">

<button class="main" onclick="profit()">Calculate</button>

<p id="result"></p>

</div>

</section>

<!-- DEPOSIT -->

<section id="deposit">

<div class="card">

<h3>Deposit Funds</h3>

<select>
<option>UPI</option>
<option>Bank Transfer</option>
</select>

<input placeholder="Enter Amount">

<p>UPI ID: versustrade@upi</p>

<button class="main">Submit Deposit</button>

</div>

</section>

<!-- ACCOUNT -->

<section id="account">

<div class="card">

<h3>Login</h3>

<input placeholder="Email">

<input placeholder="Password" type="password">

<button class="main">Login</button>

</div>

<div class="card">

<h3>Register</h3>

<input placeholder="Name">

<input placeholder="Email">

<input placeholder="Password">

<button class="main">Register</button>

</div>

</section>

<!-- FOOTER -->

<div class="footer">

<a class="support whatsapp" href="https://wa.me/919999999999">
WhatsApp Support
</a>

<a class="support call" href="tel:+919999999999">
Call Support
</a>

</div>

<script>

/* PAGE SWITCH */

function openPage(page){

let pages=document.querySelectorAll("section");

pages.forEach(p=>p.classList.remove("active"));

document.getElementById(page).classList.add("active");

}

/* PROFIT CALCULATOR */

function profit(){

let a=document.getElementById("amount").value;

let p=a*0.03;

document.getElementById("result").innerHTML="Daily Profit ₹ "+p;

}

/* CRYPTO PRICE */

async function price(){

let res=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether&vs_currencies=usd");

let data=await res.json();

btc.innerHTML=data.bitcoin.usd;
eth.innerHTML=data.ethereum.usd;
usdt.innerHTML=data.tether.usd;

}

price();
setInterval(price,10000);

</script>

</body>
</html>
