```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Mobile Trading</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.page{
display:none;
padding:15px;
}

.active{
display:block;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
}

.balance{
font-size:18px;
font-weight:bold;
}

.bottomNav{
position:fixed;
bottom:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.bottomNav button{
background:none;
border:none;
color:white;
font-size:14px;
}

.chart{
height:300px;
}

</style>
</head>

<body>

<header>Crypto Trading App</header>

<!-- HOME -->

<div id="home" class="page active">

<div class="card">
<h3>Welcome</h3>
<p>Mobile Crypto Trading Platform</p>
</div>

<div class="card">
<div class="balance">
Wallet Balance ₹ <span id="balance">0</span>
</div>
</div>

</div>

<!-- TRADE -->

<div id="trade" class="page">

<div class="card">
<h3>Market Chart</h3>
<div id="chart" class="chart"></div>
</div>

<div class="card">

<h3>Trade</h3>

<label>Pair</label>

<select id="pair">
<option>BTC/USDT</option>
<option>ETH/USDT</option>
<option>BNB/USDT</option>
</select>

<label>Type</label>

<select id="type">
<option>BUY</option>
<option>SELL</option>
</select>

<label>Amount ₹</label>

<input type="number" id="amount">

<button onclick="trade()">Execute Trade</button>

<p id="tradeMsg"></p>

</div>

</div>

<!-- WALLET -->

<div id="wallet" class="page">

<div class="card">

<h3>Wallet</h3>

Balance ₹ <span id="balance2">0</span>

</div>

</div>

<!-- DEPOSIT -->

<div id="deposit" class="page">

<div class="card">

<h3>Deposit</h3>

<select>
<option>UPI</option>
<option>Bank Transfer</option>
</select>

<input type="number" id="depAmount" placeholder="Amount ₹">

<input placeholder="UPI ID / Reference">

<button onclick="deposit()">Submit Deposit</button>

<p id="depMsg"></p>

</div>

</div>

<!-- HISTORY -->

<div id="historyPage" class="page">

<div class="card">

<h3>Trade History</h3>

<ul id="history"></ul>

</div>

</div>

<!-- NAVIGATION -->

<div class="bottomNav">

<button onclick="showPage('home')">Home</button>

<button onclick="showPage('trade')">Trade</button>

<button onclick="showPage('wallet')">Wallet</button>

<button onclick="showPage('deposit')">Deposit</button>

<button onclick="showPage('historyPage')">History</button>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

let balance=0;

function showPage(page){

let pages=document.querySelectorAll(".page");

pages.forEach(p=>p.classList.remove("active"));

document.getElementById(page).classList.add("active");

}

function deposit(){

let amt=parseFloat(document.getElementById("depAmount").value);

if(!amt)return;

balance+=amt;

document.getElementById("balance").innerText=balance;

document.getElementById("balance2").innerText=balance;

document.getElementById("depMsg").innerText="Deposit successful";

}

function trade(){

let amt=parseFloat(document.getElementById("amount").value);

let pair=document.getElementById("pair").value;

let type=document.getElementById("type").value;

if(amt>balance){

document.getElementById("tradeMsg").innerText="Insufficient Balance";

return;

}

balance-=amt;

document.getElementById("balance").innerText=balance;

document.getElementById("balance2").innerText=balance;

let msg=type+" "+pair+" ₹"+amt;

let li=document.createElement("li");

li.innerText=msg;

document.getElementById("history").appendChild(li);

document.getElementById("tradeMsg").innerText="Trade Executed";

}

new TradingView.widget({
"width":"100%",
"height":300,
"symbol":"BINANCE:BTCUSDT",
"interval":"5",
"theme":"dark",
"style":"1",
"container_id":"chart"
});

</script>

</body>
</html>
```
