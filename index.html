```html
<!DOCTYPE html>
<html>
<head>
<title>Versus Trade Invest</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.page{
display:none;
padding:15px;
}

.active{
display:block;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
}

.balance{
font-size:18px;
font-weight:bold;
}

.bottomNav{
position:fixed;
bottom:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.bottomNav button{
background:none;
border:none;
color:white;
font-size:14px;
}

.chart{
height:300px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:8px;
border:1px solid #334155;
}

.whatsapp{
position:fixed;
bottom:70px;
right:15px;
background:#25D366;
padding:15px;
border-radius:50%;
color:white;
text-decoration:none;
}

.call{
position:fixed;
bottom:70px;
left:15px;
background:#2563eb;
padding:15px;
border-radius:50%;
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<header>Versus Trade Invest</header>

<!-- HOME -->

<div id="home" class="page active">

<div class="card">

<h3>Welcome</h3>

<p>Trade crypto charts and invest easily</p>

</div>

<div class="card">

<div class="balance">

Wallet Balance ₹ <span id="balance">0</span>

</div>

</div>

</div>

<!-- TRADE -->

<div id="trade" class="page">

<div class="card">

<h3>Live Market</h3>

<div id="chart" class="chart"></div>

</div>

<div class="card">

<h3>Trade</h3>

<select id="pair">

<option>BTC/USDT</option>
<option>ETH/USDT</option>
<option>BNB/USDT</option>

</select>

<select id="type">

<option>BUY</option>
<option>SELL</option>

</select>

<input type="number" id="tradeAmount" placeholder="Amount ₹">

<button onclick="trade()">Execute Trade</button>

<p id="tradeMsg"></p>

</div>

</div>

<!-- DEPOSIT -->

<div id="deposit" class="page">

<div class="card">

<h3>Deposit</h3>

<select id="payment">

<option value="">Select Payment</option>
<option value="upi">UPI</option>
<option value="bank">Bank Transfer</option>

</select>

<div id="paymentDetails"></div>

<input type="number" id="depositAmount" placeholder="Amount ₹">

<input placeholder="UTR / Transaction ID">

<button onclick="deposit()">Submit Deposit</button>

<p id="depMsg"></p>

</div>

</div>

<!-- WALLET -->

<div id="wallet" class="page">

<div class="card">

<h3>Wallet</h3>

Balance ₹ <span id="balance2">0</span>

</div>

</div>

<!-- HISTORY -->

<div id="historyPage" class="page">

<div class="card">

<h3>Trade History</h3>

<table>

<tr>
<th>Pair</th>
<th>Type</th>
<th>Amount</th>
</tr>

<tbody id="history"></tbody>

</table>

</div>

</div>

<!-- CALCULATOR -->

<div id="calculator" class="page">

<div class="card">

<h3>Profit Calculator</h3>

<input type="number" id="invest" placeholder="Investment ₹">

<button onclick="calc()">Calculate</button>

<p id="profit"></p>

</div>

</div>

<!-- NAVIGATION -->

<div class="bottomNav">

<button onclick="showPage('home')">Home</button>

<button onclick="showPage('trade')">Trade</button>

<button onclick="showPage('deposit')">Deposit</button>

<button onclick="showPage('wallet')">Wallet</button>

<button onclick="showPage('historyPage')">History</button>

</div>

<a class="whatsapp" href="https://wa.me/919876543210">W</a>

<a class="call" href="tel:+919876543210">C</a>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

let balance=0;

function showPage(p){

let pages=document.querySelectorAll(".page");

pages.forEach(x=>x.classList.remove("active"));

document.getElementById(p).classList.add("active");

}

new TradingView.widget({
symbol:"BINANCE:BTCUSDT",
interval:"15",
theme:"dark",
style:"1",
width:"100%",
height:300,
container_id:"chart"
});

function deposit(){

let amt=parseFloat(document.getElementById("depositAmount").value);

if(!amt)return;

balance+=amt;

document.getElementById("balance").innerText=balance;

document.getElementById("balance2").innerText=balance;

document.getElementById("depMsg").innerText="Deposit Request Submitted";

}

function trade(){

let amt=parseFloat(document.getElementById("tradeAmount").value);

let pair=document.getElementById("pair").value;

let type=document.getElementById("type").value;

if(amt>balance){

document.getElementById("tradeMsg").innerText="Insufficient Balance";

return;

}

balance-=amt;

document.getElementById("balance").innerText=balance;

document.getElementById("balance2").innerText=balance;

let row="<tr><td>"+pair+"</td><td>"+type+"</td><td>"+amt+"</td></tr>";

document.getElementById("history").innerHTML+=row;

document.getElementById("tradeMsg").innerText="Trade Executed";

}

function calc(){

let a=document.getElementById("invest").value;

let p=a*0.03;

document.getElementById("profit").innerText="Daily Profit ₹"+p;

}

document.getElementById("payment").addEventListener("change",function(){

let d=document.getElementById("paymentDetails");

if(this.value=="upi"){

d.innerHTML="<p>UPI ID: versustrade@upi</p>";

}

else if(this.value=="bank"){

d.innerHTML="<p>Bank: HDFC Bank<br>Account: 1234567890<br>IFSC: HDFC0001234</p>";

}

});

</script>

</body>
</html>
